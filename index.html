<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <script>
    if (window.location.pathname === '/location' || window.location.pathname === '/location/') {
      var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent || navigator.vendor || window.opera);
      var isAndroid = /android/i.test(navigator.userAgent || navigator.vendor || window.opera);
      
      if (isAndroid) {
        // Dùng geo: mở thẳng ứng dụng bản đồ gốc của máy
        window.location.replace('geo:10.5950928,106.5558157?q=10.5950928,106.5558157(Dia%20Diem%20To%20Chuc)');
      } else if (isIOS) {
        // Ưu tiên Google Maps iOS, nếu không có thì fallback qua Apple Maps
        window.location.replace('comgooglemaps://?q=10.5950928,106.5558157');
        setTimeout(function() {
           window.location.replace('maps://?q=10.5950928,106.5558157');
        }, 300);
      } else {
        window.location.replace('https://maps.app.goo.gl/hn5Qk3ZLYiMvZQPQ7');
      }
    }
  </script>
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Playfair+Display:wght@600;700&family=Great+Vibes&display=swap"
    rel="stylesheet" />
  <title>Wedding</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
